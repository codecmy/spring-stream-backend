services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit consumer_timeout 7200000"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stream-net

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - stream-net

  minio-init:
    image: curlimages/curl:latest
    depends_on:
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      MINIO_HOST: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for MinIO to be ready...";
        sleep 10;
        
        echo "Creating videos bucket...";
        curl -X PUT "${MINIO_HOST}/videos/" -u "${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}" || true;
        
        echo "Creating video-hls bucket...";
        curl -X PUT "${MINIO_HOST}/video-hls/" -u "${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}" || true;
        
        echo "Buckets setup complete";
        exit 0;
    networks:
      - stream-net

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: streamdb
      MYSQL_USER: streamuser
      MYSQL_PASSWORD: streampass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stream-net

  backend:
    image: spring-stream-backend:latest
    container_name: backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/streamdb
      SPRING_DATASOURCE_USERNAME: streamuser
      SPRING_DATASOURCE_PASSWORD: streampass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
      MINIO_BUCKET: videos
      MINIO_HLS_BUCKET: video-hls
      HANKO_BASE_URL: https://d655128a-1ef2-4249-9ce7-64da57162e65.hanko.io
      HANKO_COOKIE_NAME: hanko
    depends_on:
      - mysql
      - rabbitmq
      - minio-init
    networks:
      - stream-net

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/var/www/static:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - stream-net

  worker:
     image: transcoder-worker:latest
     depends_on:
       rabbitmq:
         condition: service_healthy
       mysql:
         condition: service_healthy
       minio-init:
         condition: service_started
     environment:
       SPRING_RABBITMQ_HOST: rabbitmq
       SPRING_RABBITMQ_PORT: 5672
       SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/streamdb
       SPRING_DATASOURCE_USERNAME: streamuser
       SPRING_DATASOURCE_PASSWORD: streampass
       MINIO_URL: http://minio:9000
       MINIO_ACCESS_KEY: admin
       MINIO_SECRET_KEY: password
     networks:
       - stream-net

networks:
  stream-net:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  nginx-cache:
