services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    mem_limit: 256m
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_ERLANG_COOKIE: "streamflix-cookie"
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit consumer_timeout 7200000"
    entrypoint: []
    command: >
      sh -c "
        echo \"$$RABBITMQ_ERLANG_COOKIE\" > /var/lib/rabbitmq/.erlang.cookie &&
        chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie &&
        chmod 400 /var/lib/rabbitmq/.erlang.cookie &&
        exec gosu rabbitmq rabbitmq-server
      "
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - stream-net

  minio:
    image: minio/minio
    container_name: minio
    mem_limit: 512m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - stream-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      MINIO_HOST: http://minio:9000
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for MinIO to be ready...";
        sleep 10;
        mc alias set myminio "$${MINIO_HOST}" "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
        
        echo "Creating videos bucket...";
        mc mb myminio/videos --ignore-existing;
        
        echo "Creating video-hls bucket...";
        mc mb myminio/video-hls --ignore-existing;
        
        echo "Buckets setup complete";
        exit 0;
    networks:
      - stream-net

  mysql:
    image: mysql:8.0
    container_name: mysql
    mem_limit: 1g
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: streamdb
      MYSQL_USER: streamuser
      MYSQL_PASSWORD: streampass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stream-net

  backend:
    image: spring-stream-backend:latest
    container_name: backend
    mem_limit: 1g
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/streamdb
      SPRING_DATASOURCE_USERNAME: streamuser
      SPRING_DATASOURCE_PASSWORD: streampass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
      MINIO_BUCKET: videos
      MINIO_HLS_BUCKET: video-hls
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      JWT_SECRET: ${JWT_SECRET:-streamflix-default-secret-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      - mysql
      - rabbitmq
      - minio-init
      - kafka-init
    networks:
      - stream-net

  nginx:
    image: nginx:latest
    container_name: nginx
    mem_limit: 128m
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./streamflix/dist:/var/www/streamflix-dist:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - stream-net

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "echo | nc -w 2 localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - stream-net

  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating video.events topic...";
        /opt/kafka/bin/kafka-topics.sh --create \
          --topic video.events \
          --partitions 6 \
          --replication-factor 1 \
          --bootstrap-server kafka:9092 \
          --if-not-exists;
        echo "Topic setup complete";
        exit 0;
    networks:
      - stream-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - stream-net

  worker:
    build: ./services/transcoder-worker
    image: transcoder-worker:latest
    mem_limit: 3g
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_started
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_MINIO_URL: http://minio:9000
      SPRING_MINIO_ACCESS_KEY: admin
      SPRING_MINIO_SECRET_KEY: password
      SPRING_MINIO_BUCKET: videos
      SPRING_MINIO_HLS_BUCKET: video-hls
      SPRING_FILES_VIDEO: /tmp/videos
      SPRING_FILES_HLS: /tmp/hls
    networks:
      - stream-net

  analytics-consumer:
    build:
      context: ./services/analytics-consumer
    image: analytics-consumer:latest
    container_name: analytics-consumer
    mem_limit: 512m
    depends_on:
      mysql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/streamdb
      SPRING_DATASOURCE_USERNAME: streamuser
      SPRING_DATASOURCE_PASSWORD: streampass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - stream-net

networks:
  stream-net:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  nginx-cache:
  kafka_data:
