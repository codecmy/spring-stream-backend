# ===================================================================
# NGINX CDN CONFIGURATION
# ===================================================================
# This nginx acts as a reverse proxy/CDN in front of the Spring Boot backend
# Features:
#   - Routes API calls to backend
#   - Hanko authentication check
#   - Video segment caching
#   - Direct MinIO proxy for video segments

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    # ===================================================================
    # UPSTREAM BACKENDS
    # ===================================================================
    upstream spring_backend {
        server backend:8081;
        keepalive 32;
    }

    # ===================================================================
    # CACHE CONFIGURATION
    # ===================================================================
    proxy_cache_path /var/cache/nginx/video_cache
        keys_zone=video_cache:100m
        levels=1:2
        inactive=7d
        max_size=10g
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/playlist_cache
        keys_zone=playlist_cache:50m
        levels=1:2
        inactive=24h
        max_size=1g
        use_temp_path=off;

    # ===================================================================
    # CACHE CONTROL MAPS
    # ===================================================================
    map $uri $video_cache_zone {
        ~*\.ts$          video_cache;
        ~*\.m3u8$        playlist_cache;
        default          "";
    }

    map $uri $video_cache_valid {
        ~*\.ts$          "200 7d";
        ~*\.m3u8$        "200 60s";
        default          "200 1h";
    }

    map $uri $video_cache_control {
        ~*\.ts$          "public, max-age=31536000, immutable";
        ~*master\.m3u8$  "public, max-age=60";
        ~*\.m3u8$        "public, max-age=60";
        default          "no-cache";
    }

    # ===================================================================
    # AUTHENTICATION MAPS
    # ===================================================================
    map $uri $requires_auth {
        ~^/api/v1/videos.*     1;
        ~^/stream.*            1;
        default                0;
    }

    map $uri $is_public {
        ~*^/api/v1/videos$     1;
        ~*^/health$            1;
        ~.*\.m3u8$             1;
        default                0;
    }

    # ===================================================================
    # SERVER BLOCK
    # ===================================================================
    server {
        listen 80;
        server_name localhost;

        # Hanko auth configuration
        set $hanko_auth_url "https://d655128a-1ef2-4249-9ce7-64da57162e65.hanko.io";

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # =================================================================
        # HEALTH ENDPOINT (Public)
        # =================================================================
        location = /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # =================================================================
        # HANKO AUTH ENDPOINTS (Pass through)
        # =================================================================
        location ~ ^/\\.auth(/.*)?$ {
            proxy_pass $hanko_auth_url$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/hanko(/.*)?$ {
            proxy_pass $hanko_auth_url$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/callback(/.*)?$ {
            proxy_pass $hanko_auth_url$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =================================================================
        # VIDEO HLS PLAYLISTS (.m3u8) - Cached
        # =================================================================
        # Master playlist
        location ~* /api/v1/videos/[^/]+/master\.m3u8$ {
            proxy_pass http://spring_backend;
            
            proxy_cache playlist_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_key "$scheme$request_method$host$uri";
            
            add_header Cache-Control "public, max-age=60";
            add_header X-Cache-Status $upstream_cache_status;
            
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 8 64k;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Quality variant playlists (v0/index.m3u8, v1/index.m3u8, etc.)
        location ~* /api/v1/videos/[^/]+/[^/]+/index\.m3u8$ {
            proxy_pass http://spring_backend;
            
            proxy_cache playlist_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_key "$scheme$request_method$host$uri";
            
            add_header Cache-Control "public, max-age=60";
            add_header X-Cache-Status $upstream_cache_status;
            
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 8 64k;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Fallback for other .m3u8 files
        location ~* \.m3u8$ {
            proxy_pass http://spring_backend;
            
            proxy_cache playlist_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_key "$scheme$request_method$host$uri";
            
            add_header Cache-Control "public, max-age=60";
            add_header X-Cache-Status $upstream_cache_status;
            
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 8 64k;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =================================================================
        # VIDEO SEGMENTS (.ts) - Highly Cached
        # =================================================================
        # Quality segments (v0/segment_000.ts, v1/segment_001.ts, etc.)
        location ~* /api/v1/videos/[^/]+/[^/]+/\d+\.ts$ {
            proxy_cache video_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_key "$scheme$request_method$host$uri";
            
            add_header X-Cache-Status $upstream_cache_status;
            
            proxy_pass http://spring_backend;
            
            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 16 256k;
            
            add_header Cache-Control "public, max-age=31536000, immutable";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Legacy segments (backward compatibility - segment_000.ts without quality)
        location ~* /api/v1/videos/[^/]+/\d+\.ts$ {
            proxy_cache video_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_key "$scheme$request_method$host$uri";
            
            add_header X-Cache-Status $upstream_cache_status;
            
            proxy_pass http://spring_backend;
            
            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 16 256k;
            
            add_header Cache-Control "public, max-age=31536000, immutable";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Alternative segment pattern (catch-all .ts)
        location ~* \.ts$ {
            proxy_pass http://spring_backend;
            
            proxy_cache video_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_key "$scheme$request_method$host$uri";
            
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
            
            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 16 256k;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =================================================================
        # VIDEO STREAMING WITH RANGE SUPPORT
        # =================================================================
        location ~* /stream/range/ {
            proxy_pass http://spring_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI $request_uri;
            
            # Range request support
            proxy_request_buffering off;
            proxy_http_version 1.1;
            
            add_header Accept-Ranges bytes;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # =================================================================
        # API ROUTES - Backend with Auth
        # =================================================================
        location /api/v1/videos {
            proxy_pass http://spring_backend;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            client_max_body_size 2000M;
            proxy_request_buffering off;
        }

        # =================================================================
        # OTHER API ROUTES
        # =================================================================
        location /api/ {
            # Check auth
            set $auth_check 0;
            if ($http_cookie ~* "hanko=") {
                set $auth_check 1;
            }
            
            if ($uri ~* "^/health$") {
                set $auth_check 1;
            }
            
            if ($auth_check = 0) {
                return 302 $hanko_auth_url;
            }
            
            proxy_pass http://spring_backend;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # =================================================================
        # STATIC ASSETS (Frontend HTML)
        # =================================================================
        location / {
            root /var/www/static;
            index index.html;
            try_files $uri $uri/ =404;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # =================================================================
        # FALLBACK (for static files)
        # =================================================================
    }
}
