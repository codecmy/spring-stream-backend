# ===================================================================
# NGINX REVERSE PROXY CONFIGURATION
# ===================================================================
# Routes API calls to the Spring Boot backend with caching for HLS assets.
# Authentication is handled by the backend (Spring Security + Hanko JWT).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    upstream spring_backend {
        server backend:8081;
        keepalive 32;
    }

    proxy_cache_path /var/cache/nginx/video_cache
        keys_zone=video_cache:100m
        levels=1:2
        inactive=7d
        max_size=10g
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/playlist_cache
        keys_zone=playlist_cache:50m
        levels=1:2
        inactive=24h
        max_size=1g
        use_temp_path=off;

    server {
        listen 80;
        server_name localhost;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        set $backend_upstream "http://backend:8081";

        # =================================================================
        # HEALTH ENDPOINT
        # =================================================================
        location = /health {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =================================================================
        # ALL API REQUESTS -> Spring Backend
        # Authentication is enforced by Spring Security.
        # =================================================================
        location /api/ {
            proxy_pass $backend_upstream;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            client_max_body_size 2000M;
            proxy_request_buffering off;
        }

        # =================================================================
        # VIDEO HLS PLAYLISTS (.m3u8) — Server-side cached
        # Backend enforces auth; cache is keyed by URL + cookies
        # =================================================================
        location ~* /api/v1/videos/[^/]+/master\.m3u8$ {
            proxy_pass $backend_upstream;

            proxy_cache playlist_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_key "$scheme$request_method$host$uri$http_cookie";

            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 8 64k;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;

            add_header Cache-Control "private, max-age=60";
            add_header X-Cache-Status $upstream_cache_status;
        }

        location ~* /api/v1/videos/[^/]+/[^/]+/index\.m3u8$ {
            proxy_pass $backend_upstream;

            proxy_cache playlist_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_key "$scheme$request_method$host$uri$http_cookie";

            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 8 64k;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;

            add_header Cache-Control "private, max-age=60";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # =================================================================
        # VIDEO SEGMENTS (.ts) — Server-side cached with auth
        # Cache key includes cookie to prevent serving auth-gated content
        # to unauthenticated users from cache.
        # =================================================================
        location ~* /api/v1/videos/[^/]+/[^/]+/\d+\.ts$ {
            proxy_cache video_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_key "$scheme$request_method$host$uri$http_cookie";

            proxy_pass $backend_upstream;

            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 16 256k;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;

            add_header Cache-Control "private, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ~* /api/v1/videos/[^/]+/\d+\.ts$ {
            proxy_cache video_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_key "$scheme$request_method$host$uri$http_cookie";

            proxy_pass $backend_upstream;

            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 16 256k;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;

            add_header Cache-Control "private, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ~* \.ts$ {
            proxy_pass $backend_upstream;

            proxy_cache video_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_key "$scheme$request_method$host$uri$http_cookie";

            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 16 256k;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;

            add_header Cache-Control "private, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =================================================================
        # RANGE-BASED STREAMING
        # =================================================================
        location ~* /stream/range/ {
            proxy_pass $backend_upstream;

            proxy_request_buffering off;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;

            add_header Accept-Ranges bytes;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # =================================================================
        # STATIC ASSETS (React SPA + admin.html)
        # =================================================================
        location / {
            root /var/www/streamflix-dist;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
