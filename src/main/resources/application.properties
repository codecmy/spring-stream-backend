# ===================================================================
# APPLICATION CONFIGURATION
# ===================================================================
spring.application.name=spring-stream-backend
server.port=${SERVER_PORT:8081}

# ===================================================================
# DATABASE CONFIGURATION (MySQL)
# ===================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/streamdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:streamuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:streampass}

# ===================================================================
# JPA/HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# FILE UPLOAD CONFIGURATION
# ===================================================================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:1000MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:1000MB}

# ===================================================================
# HANKO AUTHENTICATION CONFIGURATION
# ===================================================================
hanko.baseUrl=${HANKO_BASE_URL:}
hanko.cookieName=${HANKO_COOKIE_NAME:hanko}

# ===================================================================
# MinIO/S3 CONFIGURATION
# ===================================================================
# Lowercase-dotted keys expected by @Value annotations
minio.url=${MINIO_URL:http://minio:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:password}
minio.bucket=${MINIO_BUCKET:videos}
minio.hls_bucket=${MINIO_HLS_BUCKET:video-hls}
# Uppercase env var aliases (for direct env var override)
MINIO_URL=${MINIO_URL}
MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
MINIO_BUCKET=${MINIO_BUCKET}
MINIO_HLS_BUCKET=${MINIO_HLS_BUCKET}

# ===================================================================
# RABBITMQ CONFIGURATION
# ===================================================================
SPRING_RABBITMQ_HOST=${SPRING_RABBITMQ_HOST:localhost}
SPRING_RABBITMQ_PORT=${SPRING_RABBITMQ_PORT:5672}
SPRING_RABBITMQ_USERNAME=${SPRING_RABBITMQ_USERNAME:guest}
SPRING_RABBITMQ_PASSWORD=${SPRING_RABBITMQ_PASSWORD:guest}

# ===================================================================
# LOCAL FILE STORAGE PATHS (Development only)
# ===================================================================
files.video=${FILES_VIDEO:Video/}
files.video.hsl=${FILES_VIDEO_HSL:Video_hsl/}
